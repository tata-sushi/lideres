name: Update compliance page count

on:
  push:
    paths:
      - 'compliance/**/*.html'

jobs:
  update-count:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Count compliance pages and update KPI
        run: |
          COUNT=$(find compliance -name '*.html' | wc -l | tr -d ' ')
          echo "Compliance pages found: $COUNT"

          # Find all files that contain the drawer KPI (auto-detect)
          CHANGED=false
          for f in $(grep -rl 'id="kpi-pages"' compliance/); do
            sed -i "s|id=\"kpi-pages\">[0-9]*<|id=\"kpi-pages\">${COUNT}<|g" "$f"
            CHANGED=true
          done

          if [ "$CHANGED" = true ] && ! git diff --quiet; then
            echo "Page count updated to $COUNT"
          else
            echo "No changes needed"
          fi

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compliance/
          git commit -m "chore: update compliance page count"
          git push
