<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Solicitações — TATÁ Sushi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F4F4F4;
  --surface: #FFFFFF;
  --carbon: #35383F;
  --citric: #CFFF00;
  --text: #111111;
  --mid: #555555;
  --muted: #999999;
  --border: #E2E2E2;
  --green: #1A5C2A;
  --green-bg: #EAF4ED;
  --amber: #7A4A00;
  --amber-bg: #FFF4DC;
  --red: #7A1A1A;
  --red-bg: #FDEAEA;
  --blue: #1A3A5C;
  --blue-bg: #E8F0FA;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.logo-img { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
.header-title { font-size: 18px; font-weight: 700; color: var(--carbon); letter-spacing: -0.3px; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }

/* KPI BAR */
.kpi-bar {
  background: var(--bg);
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
@media(max-width:640px){ .kpi-bar { grid-template-columns: repeat(2,1fr); gap: 10px; padding: 14px 16px; } }

.kpi-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  gap: 6px;
  box-shadow: var(--shadow);
}

.kpi-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1;
}
.kpi-value {
  font-family: 'DM Sans', sans-serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--carbon);
  line-height: 1;
  letter-spacing: -1px;
}
.kpi-value.citric { color: var(--carbon); }
.kpi-value.dash { color: var(--border); font-size: 28px; }

/* FILTERS */
.filters-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 12px;
}
.filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; flex: 1; }
.filter-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--mid); }
.filter-select {
  appearance: none;
  background: var(--bg) url("data:image/svg+xml,%3Csvg width='11' height='7' viewBox='0 0 11 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5.5 6L10 1' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 30px 8px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  width: 100%;
  transition: border-color 0.15s;
}
.filter-select:focus { outline: none; border-color: var(--carbon); }
.filter-actions {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  margin-left: auto;
}
.btn-clear {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 8px 0;
  white-space: nowrap;
}
.result-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--mid);
  padding: 8px 0;
  white-space: nowrap;
}
.result-count strong { color: var(--carbon); font-weight: 600; }

/* CONTENT */
.content { padding: 20px 20px 80px; max-width: 1200px; margin: 0 auto; }
.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* CARDS */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media(min-width:720px){ .cards-grid { grid-template-columns: repeat(2,1fr); } }
@media(min-width:1100px){ .cards-grid { grid-template-columns: repeat(3,1fr); } }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.18s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }

.card-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.card-header-left { flex: 1; min-width: 0; }
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--carbon);
  line-height: 1.35;
  word-break: break-word;
}

.card-body {
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
  flex: 1;
}
.field-group { display: flex; flex-direction: column; gap: 2px; }
.field-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
}
.field-value {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}
.field-group.full { grid-column: 1 / -1; }



/* STATUS BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-finalizado   { background: var(--green-bg); color: var(--green); }
.badge-andamento    { background: var(--blue-bg);  color: var(--blue); }
.badge-pendente     { background: var(--amber-bg); color: var(--amber); }
.badge-cancelado    { background: #F0F0F0;          color: #666; }
.badge-default      { background: #F0F0F0;          color: #888; }

/* TIPO BADGE */
.tipo-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 6px;
  background: #F0F0F0;
  color: #555;
  margin-top: 4px;
  width: fit-content;
}
.tipo-uniforme  { background: #E8F0FA; color: #1A3A5C; }
.tipo-epi       { background: #FFF4DC; color: #7A4A00; }
.tipo-outros    { background: #F0F0F0; color: #555; }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}
.empty-icon { color: var(--border); margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--mid); margin-bottom: 6px; }
.empty-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

/* FOOTER */
.page-footer {
  background: var(--carbon);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
}
.footer-module {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--citric);
}
.footer-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.3px;
}
</style>

    </select>
  </div>
  <div class="filter-group">
    <label class="filter-label">Unidade</label>
    <select class="filter-select" id="f-unidade" onchange="applyFilters()">
      <option>Todos</option>
    </select>
  </div>
  <div class="filter-group">
    <label class="filter-label">Departamento</label>
    <select class="filter-select" id="f-departamento" onchange="applyFilters()">
      <option>Todos</option>
    </select>
  </div>
  <div class="filter-group">
    <label class="filter-label">Tipo de Solicitação</label>
    <select class="filter-select" id="f-tipo" onchange="applyFilters()">
      <option>Todos</option>
    </select>
  </div>
  <div class="filter-group">
    <label class="filter-label">Status</label>
    <select class="filter-select" id="f-status" onchange="applyFilters()">
      <option>Todos</option>
    </select>
  </div>
  <div class="filter-actions">
    <button class="btn-clear" onclick="clearFilters()">Limpar filtros</button>
    <span class="result-count"><strong id="count-num">0</strong> resultado(s)</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="section-title" id="section-label">Solicitações</div>
  <div class="cards-grid" id="cards-grid">
    <!-- cards renderizados por JS -->
  </div>
</div>

<!-- FOOTER -->
<footer class="page-footer">
  <span class="footer-module">TATÁ SUSHI &nbsp;|&nbsp; GENTE &amp; GESTÃO &nbsp;|&nbsp; 2024 – 2026</span>
  <span class="footer-date" id="footer-date">–</span>
</footer>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
var SHEET_ID  = '1PC5rZYA4zZGv0U0zkIJbpctA1MsGCG8kRawAOMiMznY';
var GID       = '1411059243';
var API_KEY   = 'AIzaSyCYDJdw0a5t_Ievs0Jh-msg4x4fpGbQDto';
// ─────────────────────────────────────────────────────────────────────────────

var DATA = [];

var filtered = DATA.slice();

function getStatusClass(status) {
  var s = (status || '').toLowerCase();
  if (s === 'finalizado') return 'badge-finalizado';
  if (s === 'em andamento') return 'badge-andamento';
  if (s === 'pendente') return 'badge-pendente';
  if (s === 'cancelado') return 'badge-cancelado';
  return 'badge-default';
}

function getTipoClass(tipo) {
  var t = (tipo || '').toLowerCase();
  if (t === 'uniforme') return 'tipo-uniforme';
  if (t.includes('epi')) return 'tipo-epi';
  return 'tipo-outros';
}

function getSVGStatus(status) {
  var s = (status || '').toLowerCase();
  if (s === 'finalizado') {
    return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  }
  if (s === 'em andamento') {
    return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
  }
  if (s === 'pendente') {
    return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
  }
  return '';
}

function buildCard(sol) {
  var statusClass = getStatusClass(sol.status);
  var tipoClass = getTipoClass(sol.tipo);
  var svgStatus = getSVGStatus(sol.status);

  return '<div class="card">' +
    '<div class="card-header">' +
      '<div class="card-header-left">' +
        '<div class="card-title">' + sol.titulo + '</div>' +
        '<span class="tipo-badge ' + tipoClass + '">' + sol.tipo + '</span>' +
      '</div>' +
      '<span class="badge ' + statusClass + '">' + svgStatus + ' ' + sol.status + '</span>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="field-group">' +
        '<span class="field-label">Unidade</span>' +
        '<span class="field-value">' + sol.unidade + '</span>' +
      '</div>' +
      '<div class="field-group">' +
        '<span class="field-label">Departamento</span>' +
        '<span class="field-value">' + sol.departamento + '</span>' +
      '</div>' +
      '<div class="field-group">' +
        '<span class="field-label">Solicitante</span>' +
        '<span class="field-value">' + sol.solicitante + '</span>' +
      '</div>' +
      '<div class="field-group">' +
        '<span class="field-label">Abertura</span>' +
        '<span class="field-value">' + sol.abertura + '</span>' +
      '</div>' +
      '<div class="field-group">' +
        '<span class="field-label">Atualização</span>' +
        '<span class="field-value">' + sol.atualizacao + '</span>' +
      '</div>' +
      '<div class="field-group">' +
        '<span class="field-label">SLA (dias)</span>' +
        '<span class="field-value">' + sol.sla + '</span>' +
      '</div>' +
      (sol.devolutiva && sol.devolutiva.trim() ? '<div class="field-group full">' +
        '<span class="field-label">Devolutiva</span>' +
        '<span class="field-value">' + sol.devolutiva + '</span>' +
      '</div>' : '') +
    '</div>' +
  '</div>';
}

function populateFilter(id, key) {
  var sel = document.getElementById(id);
  var current = sel.value;
  var vals = ['Todos'];
  DATA.forEach(function(d) { if (d[key] && vals.indexOf(d[key]) === -1) vals.push(d[key]); });
  sel.innerHTML = vals.map(function(v) { return '<option>' + v + '</option>'; }).join('');
  if (vals.indexOf(current) !== -1) sel.value = current;
}

function applyFilters() {
  var fSol  = document.getElementById('f-solicitante').value;
  var fUni  = document.getElementById('f-unidade').value;
  var fDep  = document.getElementById('f-departamento').value;
  var fTipo = document.getElementById('f-tipo').value;
  var fSta  = document.getElementById('f-status').value;

  filtered = DATA.filter(function(d) {
    if (fSol  !== 'Todos' && d.solicitante   !== fSol)  return false;
    if (fUni  !== 'Todos' && d.unidade       !== fUni)  return false;
    if (fDep  !== 'Todos' && d.departamento  !== fDep)  return false;
    if (fTipo !== 'Todos' && d.tipo          !== fTipo) return false;
    if (fSta  !== 'Todos' && d.status        !== fSta)  return false;
    return true;
  });

  renderCards();
  updateKPIs();
}

function clearFilters() {
  ['f-solicitante','f-unidade','f-departamento','f-tipo','f-status'].forEach(function(id) {
    document.getElementById(id).value = 'Todos';
  });
  filtered = DATA.slice();
  renderCards();
  updateKPIs();
}

function renderCards() {
  var grid = document.getElementById('cards-grid');
  document.getElementById('count-num').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">' +
      '<div class="empty-icon">' +
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>' +
      '</div>' +
      '<div class="empty-title">Nenhuma solicitação encontrada</div>' +
      '<div class="empty-sub">Ajuste os filtros para ver mais resultados</div>' +
    '</div>';
    return;
  }
  grid.innerHTML = filtered.map(buildCard).join('');
}

function updateKPIs() {
  var src = filtered.length > 0 && (
    document.getElementById('f-solicitante').value !== 'Todos' ||
    document.getElementById('f-unidade').value !== 'Todos' ||
    document.getElementById('f-departamento').value !== 'Todos' ||
    document.getElementById('f-tipo').value !== 'Todos' ||
    document.getElementById('f-status').value !== 'Todos'
  ) ? filtered : DATA;

  var total = src.length;
  var fin = src.filter(function(d){ return d.status === 'Finalizado'; }).length;
  var and = src.filter(function(d){ return d.status === 'Em andamento'; }).length;
  var pen = src.filter(function(d){ return d.status === 'Pendente'; }).length;
  var slaArr = src.map(function(d){ return d.sla || 0; });
  var slaAvg = slaArr.length ? Math.round(slaArr.reduce(function(a,b){ return a+b; }, 0) / slaArr.length) : 0;

  document.getElementById('kpi-total').textContent      = total;
  document.getElementById('kpi-finalizados').textContent = fin;
  document.getElementById('kpi-andamento').textContent   = and > 0 ? and : '–';
  document.getElementById('kpi-pendentes').textContent   = pen;
  document.getElementById('kpi-sla').textContent         = slaAvg;

  document.getElementById('kpi-andamento').className = and === 0 ? 'kpi-value dash' : 'kpi-value';
}

// ─── MAPEAMENTO DAS COLUNAS DA PLANILHA ──────────────────────────────────────
// Ajuste os índices (0-based) conforme os cabeçalhos reais da aba
var COL = {
  id:           0,   // Coluna A
  titulo:       1,   // Coluna B
  tipo:         2,   // Coluna C
  unidade:      3,   // Coluna D
  departamento: 4,   // Coluna E
  solicitante:  5,   // Coluna F
  abertura:     6,   // Coluna G
  status:       7,   // Coluna H
  devolutiva:   8,   // Coluna I
  atualizacao:  9,   // Coluna J
  sla:          10   // Coluna K
};
// ─────────────────────────────────────────────────────────────────────────────

function showLoading() {
  document.getElementById('cards-grid').innerHTML =
    '<div class="empty-state">' +
      '<div class="empty-icon">' +
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>' +
          '<line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>' +
          '<line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>' +
          '<line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>' +
        '</svg>' +
      '</div>' +
      '<div class="empty-title">Carregando dados da planilha…</div>' +
      '<div class="empty-sub">Buscando via Google Sheets API</div>' +
    '</div>';
}

function showError(msg) {
  document.getElementById('cards-grid').innerHTML =
    '<div class="empty-state">' +
      '<div class="empty-icon">' +
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#EEA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>' +
          '<line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' +
        '</svg>' +
      '</div>' +
      '<div class="empty-title">Erro ao carregar dados</div>' +
      '<div class="empty-sub">' + msg + '</div>' +
    '</div>';
}

function rowToObj(row) {
  function cell(i) { return (row[i] || '').toString().trim(); }
  var slaRaw = cell(COL.sla);
  var slaNum = parseFloat(slaRaw.replace(',', '.'));
  return {
    id:           cell(COL.id),
    titulo:       cell(COL.titulo),
    tipo:         cell(COL.tipo),
    unidade:      cell(COL.unidade),
    departamento: cell(COL.departamento),
    solicitante:  cell(COL.solicitante),
    abertura:     cell(COL.abertura),
    status:       cell(COL.status),
    devolutiva:   cell(COL.devolutiva),
    atualizacao:  cell(COL.atualizacao),
    sla:          isNaN(slaNum) ? 0 : slaNum
  };
}

function updateFooter() {
  var now = new Date();
  var pad = function(n){ return String(n).padStart(2,'0'); };
  var ds = pad(now.getDate()) + '/' + pad(now.getMonth()+1) + '/' + now.getFullYear() +
           ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('footer-date').textContent = 'Atualizado em ' + ds;
}

function fetchAndRender() {
  showLoading();

  var range  = 'A:K';
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID +
            '/values/' + encodeURIComponent(range) +
            '?key=' + API_KEY +
            '&majorDimension=ROWS' +
            '&valueRenderOption=UNFORMATTED_VALUE' +
            '&dateTimeRenderOption=FORMATTED_STRING' +
            (GID ? '&ranges=' + encodeURIComponent(range) + '&includeGridData=false' : '');

  // Monta URL usando gid para buscar a aba correta pelo sheet name
  var urlV4 = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID +
              '?includeGridData=false&key=' + API_KEY;

  // Primeiro buscamos o nome da aba pelo gid, depois buscamos os dados
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '?key=' + API_KEY)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ': Verifique se a planilha está pública e a API Key é válida.');
      return r.json();
    })
    .then(function(meta) {
      var sheets = meta.sheets || [];
      var sheetName = null;
      for (var i = 0; i < sheets.length; i++) {
        var props = sheets[i].properties || {};
        if (String(props.sheetId) === GID) {
          sheetName = props.title;
          break;
        }
      }
      if (!sheetName && sheets.length > 0) {
        sheetName = (sheets[0].properties || {}).title || 'Sheet1';
      }
      if (!sheetName) throw new Error('Aba não encontrada (gid=' + GID + ')');
      return sheetName;
    })
    .then(function(sheetName) {
      var dataUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID +
                    '/values/' + encodeURIComponent(sheetName + '!A:K') +
                    '?key=' + API_KEY +
                    '&valueRenderOption=FORMATTED_VALUE';
      return fetch(dataUrl).then(function(r) {
        if (!r.ok) throw new Error('Erro ao buscar dados: HTTP ' + r.status);
        return r.json();
      });
    })
    .then(function(json) {
      var rows = json.values || [];
      if (rows.length < 2) {
        DATA.length = 0;
        filtered = [];
        renderCards();
        updateKPIs();
        updateFooter();
        return;
      }

      // Linha 0 = cabeçalho, ignorar
      // Detecta automaticamente as colunas pelo cabeçalho
      var header = rows[0].map(function(h){ return (h||'').toString().toLowerCase().trim(); });

      // Mapeamento automático por nome de coluna (fallback para COL fixo)
      var autoMap = {
        id:           findCol(header, ['id','número','numero','sol']),
        titulo:       findCol(header, ['titulo','título','solicitação','solicitacao','descrição','descricao']),
        tipo:         findCol(header, ['tipo','categoria']),
        unidade:      findCol(header, ['unidade','loja','local']),
        departamento: findCol(header, ['departamento','setor','área','area']),
        solicitante:  findCol(header, ['solicitante','nome','colaborador']),
        abertura:     findCol(header, ['abertura','data abertura','data de abertura','data']),
        status:       findCol(header, ['status','situação','situacao']),
        devolutiva:   findCol(header, ['devolutiva','resposta','observação','observacao']),
        atualizacao:  findCol(header, ['atualização','atualizacao','ultima atualização','ultima atualizacao']),
        sla:          findCol(header, ['sla','dias','prazo'])
      };

      // Aplica mapeamento automático se encontrou colunas
      for (var k in autoMap) {
        if (autoMap[k] !== -1) COL[k] = autoMap[k];
      }

      // Limite: somente solicitações abertas nos últimos 10 dias
      var hoje = new Date();
      hoje.setHours(0, 0, 0, 0);
      var limite = new Date(hoje);
      limite.setDate(limite.getDate() - 10);

      function parseDateBR(str) {
        if (!str) return null;
        str = str.toString().trim();
        var m;
        m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
        if (m) return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
        m = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return null;
      }

      DATA.length = 0;
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        if (!row || row.every(function(c){ return !c; })) continue;
        var obj = rowToObj(row);
        if (!obj.titulo && !obj.id) continue;
        var dtAbertura = parseDateBR(obj.abertura);
        if (dtAbertura && dtAbertura < limite) continue;
        DATA.push(obj);
      }

      filtered = DATA.slice();

      populateFilter('f-solicitante', 'solicitante');
      populateFilter('f-unidade',     'unidade');
      populateFilter('f-departamento','departamento');
      populateFilter('f-tipo',        'tipo');
      populateFilter('f-status',      'status');

      renderCards();
      updateKPIs();
      updateFooter();
    })
    .catch(function(err) {
      showError(err.message || 'Erro desconhecido');
      console.error(err);
    });
}

function findCol(header, candidates) {
  for (var c = 0; c < candidates.length; c++) {
    for (var i = 0; i < header.length; i++) {
      if (header[i].indexOf(candidates[c]) !== -1) return i;
    }
  }
  return -1;
}

function init() {
  // Inicia filtros vazios
  ['f-solicitante','f-unidade','f-departamento','f-tipo','f-status'].forEach(function(id) {
    var sel = document.getElementById(id);
    sel.innerHTML = '<option>Todos</option>';
  });
  updateFooter();
  fetchAndRender();
}

init();
</script>
