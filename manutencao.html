<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção — TATÁ Sushi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F4F4F4; --surface: #FFFFFF; --carbon: #35383F; --citric: #CFFF00;
  --text: #111111; --mid: #555555; --muted: #999999; --border: #E2E2E2;
  --green: #1A5C2A; --green-bg: #EAF4ED;
  --amber: #7A4A00; --amber-bg: #FFF4DC;
  --red: #7A1A1A; --red-bg: #FDEAEA;
  --blue: #1A3A5C; --blue-bg: #E8F0FA;
  --orange: #7A3A00; --orange-bg: #FFF0E0;
  --radius: 8px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overflow-x: hidden; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.logo-img { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
.header-title { font-size: 20px; font-weight: 700; color: var(--carbon); letter-spacing: -0.3px; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }
.section-header { display: flex; align-items: center; justify-content: space-between; }
.btn-nova { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--carbon); color: var(--citric); border: none; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; text-transform: uppercase; transition: opacity 0.15s; white-space: nowrap; }
.btn-nova:hover { opacity: 0.85; }

/* KPI */
.kpi-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; }
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.kpi-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 36px; font-weight: 700; color: var(--carbon); line-height: 1; }

/* FILTERS */
.filters-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; }
.filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--mid); }
.filter-select { appearance: none; background: var(--bg) url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 12px center; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 36px 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); cursor: pointer; width: 100%; }
.filter-select:focus { outline: none; border-color: var(--carbon); }
.filters-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.btn-clear { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 0; text-transform: uppercase; text-decoration: underline; text-underline-offset: 2px; }
.btn-clear:hover { color: var(--carbon); }
.results-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
.results-count b { font-weight: 600; }

/* SECTION LABEL */
.section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 16px 20px 8px; }

/* CONTENT */
.content { padding: 0 20px 80px; display: flex; flex-direction: column; gap: 10px; }

/* ── CARD ── */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); transition: border-color 0.2s, box-shadow 0.2s; }
/* estado: aguardando apoio — borda laranja + sombra sutil */
.card.needs-help { border-color: #E8A020; box-shadow: 0 0 0 2px rgba(232,160,32,0.15); }

/* topo do card */
.card-top { padding: 14px 16px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.card-top-left { display: flex; flex-direction: column; gap: 8px; flex: 1; justify-content: center; }

/* pill categoria */
.cat-pill { display: inline-flex; align-items: center; padding: 3px 10px; background: #F0F0F0; border-radius: 100px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: var(--mid); width: fit-content; }

/* título centralizado (vertical via flex já resolve, aqui alinhamento texto) */
.card-title { font-size: 16px; font-weight: 700; color: var(--carbon); letter-spacing: -0.2px; line-height: 1.35; }

/* topo direito: status + avatares */
.card-top-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 8px; flex-shrink: 0; }

/* status badge */
.status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.3px; white-space: nowrap; }
.s-pendente   { background: var(--amber-bg); color: var(--amber); }
.s-andamento  { background: var(--blue-bg);  color: var(--blue); }
.s-finalizado { background: var(--green-bg); color: var(--green); }
.s-critico    { background: var(--red-bg);   color: var(--red); }

/* avatares de responsáveis */
.avatars { display: flex; align-items: center; gap: -4px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; border: 2px solid var(--surface); color: #fff; text-transform: uppercase; flex-shrink: 0; margin-left: -6px; position: relative; }
.avatar:first-child { margin-left: 0; }
/* executor — carbon */
.avatar.exec { background: var(--carbon); }
/* apoio solicitado — laranja com pulso */
.avatar.help { background: #E8A020; animation: pulse 1.8s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232,160,32,0.5); }
  50%       { box-shadow: 0 0 0 5px rgba(232,160,32,0); }
}
/* tooltip no avatar */
.avatar[title] { cursor: default; }

/* CAMPOS */
.card-fields { padding: 12px 16px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
.card-field { display: flex; flex-direction: column; gap: 2px; }
.card-field.full { grid-column: 1 / -1; }
.field-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }
.field-value { font-size: 14px; color: var(--carbon); font-weight: 500; line-height: 1.3; }
.field-value.obs { font-weight: 400; color: var(--mid); }

/* HISTÓRICO colapsável */
.hist-toggle { grid-column: 1/-1; margin-top: 2px; }
.hist-btn { display: inline-flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.4px; color: var(--mid); background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 4px 10px; cursor: pointer; }
.hist-btn:hover { background: #eaeaea; }
.hist-btn .arr { font-size: 8px; display: inline-block; transition: transform .2s; }
.hist-btn.open .arr { transform: rotate(180deg); }
.hist-feed { display: none; margin-top: 8px; border-left: 2px solid var(--border); padding-left: 10px; flex-direction: column; gap: 8px; }
.hist-feed.vis { display: flex; }
.h-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
.h-badge { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; padding: 1px 7px; border-radius: 100px; }
.h-ts   { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.h-resp { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--carbon); font-weight: 500; }
.h-obs  { font-size: 12px; color: var(--carbon); line-height: 1.4; }
.h-cost { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); margin-top: 2px; }
/* entrada de apoio solicitado */
.h-help-entry { background: #FFF8EC; border-left: 3px solid #E8A020; border-radius: 4px; padding: 6px 10px; font-size: 12px; color: var(--carbon); }
.h-help-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .5px; color: #E8A020; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }

/* FOOTER DO CARD */
.card-footer { border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #FAFAFA; }
.meta-pill { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--mid); }
.btn-dev { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--carbon); color: var(--citric); border: none; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; text-transform: uppercase; }
.btn-dev:hover { opacity: .85; }
.check-ok { display: inline-flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); background: var(--green-bg); padding: 4px 10px; border-radius: 100px; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: .5px; text-transform: uppercase; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-header h3 { font-size: 14px; font-weight: 700; color: var(--carbon); text-transform: uppercase; letter-spacing: -0.1px; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; }
.modal-ctx { margin: 14px 20px 0; background: var(--bg); border-radius: 6px; padding: 12px 14px; border: 1px solid var(--border); }
.modal-ctx-title { font-size: 13px; font-weight: 600; color: var(--carbon); text-transform: uppercase; margin-bottom: 3px; }
.modal-ctx-row { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--mid); margin-top: 1px; }
.modal-hist { margin: 14px 20px 0; }
.mh-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.mh-empty { font-size: 12px; color: var(--muted); font-style: italic; }
.mh-feed { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.mh-entry { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.mh-entry:last-child { border-bottom: none; }
.mh-entry:first-child { background: #F6FFDD; }
.mh-entry.mh-help { background: #FFF8EC; border-left: 3px solid #E8A020; }
.mh-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.mh-ts   { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.mh-resp { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--carbon); font-weight: 500; }
.mh-text { font-size: 12.5px; color: var(--carbon); line-height: 1.45; }
.mh-cost { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); margin-top: 3px; }

/* Botão "Preciso de ajuda" no modal */
.help-section { margin: 0 20px; padding: 12px 14px; border-radius: 6px; border: 1px dashed #E8A020; background: #FFF8EC; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.help-section-text { font-size: 12px; color: var(--mid); line-height: 1.4; }
.help-section-text strong { color: var(--carbon); }
.btn-help { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; background: #E8A020; color: #fff; border: none; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.btn-help:hover { opacity: .88; }
.btn-help.active { background: var(--green); }

.modal-divider { margin: 14px 20px 0; border: none; border-top: 1px solid var(--border); }
.modal-body { padding: 14px 20px 0; display: flex; flex-direction: column; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
.form-input, .form-select, .form-textarea { font-family: 'DM Sans', sans-serif; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--carbon); background: var(--surface); outline: none; width: 100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--carbon); }
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; position: sticky; bottom: 0; background: var(--surface); }
.btn-cancel { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; cursor: pointer; text-transform: uppercase; }
.btn-submit { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; border: none; border-radius: 6px; padding: 8px 18px; background: var(--carbon); color: var(--citric); cursor: pointer; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; }
.btn-submit:hover { opacity: .85; }

/* TOAST */
.toast { position: fixed; bottom: 72px; right: 20px; background: var(--carbon); color: var(--citric); font-family: 'DM Mono', monospace; font-size: 11px; padding: 10px 16px; border-radius: 6px; display: none; z-index: 300; }
.toast.show { display: block; }


/* MODAL NOVO CHAMADO — reutiliza classes .modal / .modal-overlay */
#fab-overlay .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
#fab-overlay .form-select { appearance: none; background: var(--surface) url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 12px center; }

/* LOADING OVERLAY */
.loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,.75); z-index:500; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
.loading-overlay.show { display:flex; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--carbon); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* FOOTER */
.footer { background: var(--carbon); padding: 10px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
.footer-module { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--citric); letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.footer-date { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,.4); text-align: center; }

@media (min-width: 768px) {
  .kpi-wrap, .filters-wrap { max-width: 800px; margin: 0 auto; }
  .content { max-width: 800px; margin: 0 auto; padding: 0 32px 80px; }
  .section-label { max-width: 800px; margin: 0 auto; padding: 16px 32px 8px; }
  .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  .card-fields { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

// UTILITARIOS
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uniq(arr) {
  var seen={}, out=[];
  arr.forEach(function(v){ if(v&&!seen[v]){seen[v]=true;out.push(v);} });
  return out.sort();
}
function slugS(s) {
  var l=(s||'').toLowerCase();
  if(l==='pendente') return 's-pendente';
  if(l==='em andamento') return 's-andamento';
  if(l==='finalizado') return 's-finalizado';
  if(l.indexOf('tico')>=0) return 's-critico';
  return 's-pendente';
}
function bgOf(s) {
  var l=(s||'').toLowerCase();
  if(l==='finalizado') return 'var(--green-bg)';
  if(l==='em andamento') return 'var(--blue-bg)';
  if(l.indexOf('tico')>=0) return 'var(--red-bg)';
  return 'var(--amber-bg)';
}
function fgOf(s) {
  var l=(s||'').toLowerCase();
  if(l==='finalizado') return 'var(--green)';
  if(l==='em andamento') return 'var(--blue)';
  if(l.indexOf('tico')>=0) return 'var(--red)';
  return 'var(--amber)';
}
function iconS(s) {
  var l=(s||'').toLowerCase();
  if(l==='finalizado') return '&#10003; ';
  if(l==='em andamento') return '&#9679; ';
  if(l.indexOf('tico')>=0) return '&#9888; ';
  return '';
}
function initial(name) { return name ? name.trim()[0].toUpperCase() : '?'; }
function nowLocal() {
  var d=new Date(), p=function(n){return n<10?'0'+n:n;};
  return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function opt(arr, sel) {
  var items = ['Todos'].concat(arr);
  return items.map(function(v) {
    return '<option value="'+esc(v)+'"'+(v===sel?' selected':'')+'>'+esc(v)+'</option>';
  }).join('');
}

// LOADING
function showLoading(msg) {
  var el = document.getElementById('loading-overlay');
  if (el) { el.querySelector('span').textContent = msg||'Carregando...'; el.classList.add('show'); }
}
function hideLoading() {
  var el = document.getElementById('loading-overlay');
  if (el) el.classList.remove('show');
}

// API
function apiGet(callback) {
  showLoading('Carregando dados...');
  fetch(WEB_APP_URL)
    .then(function(r){ return r.json(); })
    .then(function(json) {
      hideLoading();
      if (json.ok) callback(null, json.data);
      else callback(json.error||'Erro desconhecido');
    })
    .catch(function(e){ hideLoading(); callback(e.message); });
}
function apiPost(data, callback) {
  fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.json(); })
  .then(function(json) {
    if (json.ok) callback(null, json.data);
    else callback(json.error||'Erro no servidor');
  })
  .catch(function(e){ callback(e.message); });
}

// CARREGAR DADOS
function carregarDados() {
  apiGet(function(err, data) {
    if (err) {
      document.getElementById('content').innerHTML =
        '<div class="empty-state"><p>Erro ao carregar dados</p></div>';
      return;
    }
    manutencoes = data;
    render();
  });
}

// FILTROS
function getFiltered() {
  var f = state.filters;
  return manutencoes.filter(function(r) {
    if (f.unidade!=='Todos' && r.unidade!==f.unidade) return false;
    if (f.departamento!=='Todos' && r.departamento!==f.departamento) return false;
    if (f.status!=='Todos' && r.status!==f.status) return false;
    if (f.prioridade!=='Todos' && r.prioridade!==f.prioridade) return false;
    if (f.solicitante!=='Todos' && r.solicitante!==f.solicitante) return false;
    return true;
  });
}

// KPIs
function kpi(l, v) {
  return '<div class="kpi-card"><div class="kpi-label">'+l+'</div><div class="kpi-value">'+v+'</div></div>';
}
function renderKPIs() {
  var total = manutencoes.length;
  var pend  = manutencoes.filter(function(r){ return r.status==='Pendente'; }).length;
  var and   = manutencoes.filter(function(r){ return r.status==='Em Andamento'; }).length;
  var fin   = manutencoes.filter(function(r){ return r.status==='Finalizado'; }).length;
  var crit  = manutencoes.filter(function(r){ return r.status==='Critico' || (r.status||'').toLowerCase().indexOf('tico')>=0; }).length;
  var help  = manutencoes.filter(function(r){ return r.needs_help; }).length;
  document.getElementById('kpi-grid').innerHTML =
    kpi('Total',total)+kpi('Finalizados',fin)+kpi('Em Andamento',and)+kpi('Pendentes',pend)+kpi('Criticos',crit)+kpi('Aguard. Apoio',help);
}

// FILTROS RENDER
function renderFilters() {
  var f = state.filters;
  var filtered = getFiltered();
  var unidades     = uniq(manutencoes.map(function(r){ return r.unidade; }));
  var departamentos= uniq(manutencoes.map(function(r){ return r.departamento; }));
  var statuses     = uniq(manutencoes.map(function(r){ return r.status; }));
  var prios        = uniq(manutencoes.map(function(r){ return r.prioridade; }));
  var solicitantes = uniq(manutencoes.map(function(r){ return r.solicitante; }));

  var html = '';
  html += '<div class="filter-group"><label class="filter-label">Unidade</label>';
  html += '<select class="filter-select" onchange="setFilter(&#39;unidade&#39;,this.value)">'+opt(unidades,f.unidade)+'</select></div>';
  html += '<div class="filter-group"><label class="filter-label">Departamento</label>';
  html += '<select class="filter-select" onchange="setFilter(&#39;departamento&#39;,this.value)">'+opt(departamentos,f.departamento)+'</select></div>';
  html += '<div class="filter-group"><label class="filter-label">Status</label>';
  html += '<select class="filter-select" onchange="setFilter(&#39;status&#39;,this.value)">'+opt(statuses,f.status)+'</select></div>';
  html += '<div class="filter-group"><label class="filter-label">Prioridade</label>';
  html += '<select class="filter-select" onchange="setFilter(&#39;prioridade&#39;,this.value)">'+opt(prios,f.prioridade)+'</select></div>';
  html += '<div class="filter-group"><label class="filter-label">Solicitante</label>';
  html += '<select class="filter-select" onchange="setFilter(&#39;solicitante&#39;,this.value)">'+opt(solicitantes,f.solicitante)+'</select></div>';

  document.getElementById('filters-grid').innerHTML = html;
  document.getElementById('results-count').innerHTML =
    '<b>'+filtered.length+'</b> resultado'+(filtered.length!==1?'s':'');
}
function setFilter(k, v) { state.filters[k]=v; render(); }
function clearFilters() {
  state.filters = { unidade:'Todos', departamento:'Todos', status:'Todos', prioridade:'Todos', solicitante:'Todos' };
  render();
}

// AVATAR
function avatarHTML(r) {
  var exec = '<span class="avatar exec" title="Executor: '+esc(r.executor)+'">'+initial(r.executor)+'</span>';
  var help = r.needs_help ? '<span class="avatar help" title="Aguardando apoio de '+esc(r.apoio)+'">'+initial(r.apoio)+'</span>' : '';
  return '<div class="avatars">'+exec+help+'</div>';
}

// HISTORICO
function histHTML(r) {
  var n = r.devolutivas ? r.devolutivas.length : 0;
  if (!n) return '';
  var isOpen = !!state.exp[r.id];
  var label = n===1 ? '1 atualizacao' : n+' atualizacoes';
  var feed = '';
  for (var i=0; i<n; i++) {
    var dv = r.devolutivas[i];
    if (dv.tipo==='help') {
      feed += '<div class="h-help-entry">';
      feed += '<div class="h-help-label">&#9888; Apoio solicitado &middot; '+esc(dv.ts)+'</div>';
      feed += esc(dv.obs)+'</div>';
    } else {
      feed += '<div style="margin-bottom:6px">';
      feed += '<div class="h-meta">';
      feed += '<span class="h-badge" style="background:'+bgOf(dv.status)+';color:'+fgOf(dv.status)+'">'+esc(dv.status)+'</span>';
      feed += '<span class="h-ts">'+esc(dv.ts)+'</span>';
      feed += '<span class="h-resp">'+esc(dv.responsavel)+'</span></div>';
      feed += '<div class="h-obs">'+esc(dv.obs)+'</div>';
      if (dv.custo) feed += '<div class="h-cost">Custo: '+esc(dv.custo)+'</div>';
      feed += '</div>';
    }
  }
  var openClass = isOpen ? ' open' : '';
  var visClass  = isOpen ? ' vis'  : '';
  var btn = '<button class="hist-btn'+openClass+'" onclick="toggleHist('+JSON.stringify(r.id)+')">';
  btn += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ';
  btn += label+' <span class="arr">&#9660;</span></button>';
  return '<div class="hist-toggle card-field full">'+btn+'<div class="hist-feed'+visClass+'" id="hist-'+r.id+'">'+feed+'</div></div>';
}
function toggleHist(id) {
  state.exp[id] = !state.exp[id];
  var feed = document.getElementById('hist-'+id);
  var btn  = feed ? feed.previousElementSibling : null;
  if (!feed) return;
  if (state.exp[id]) { feed.classList.add('vis'); if(btn) btn.classList.add('open'); }
  else               { feed.classList.remove('vis'); if(btn) btn.classList.remove('open'); }
}

// CARD
function cardHTML(r) {
  var footer = '';
  if (r.status==='Finalizado') {
    var custos = (r.devolutivas||[]).filter(function(d){ return d.custo; }).map(function(d){ return d.custo; }).join(' + ');
    footer = '<div class="card-footer"><span class="check-ok">';
    footer += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    footer += ' Finalizado'+(custos?' &middot; '+esc(custos):'')+'</span></div>';
  } else {
    footer = '<div class="card-footer">';
    footer += '<div class="meta-pill"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Prazo: '+esc(r.data_prazo)+'</div>';
    footer += '<button class="btn-dev" onclick="openModal('+JSON.stringify(r.id)+')">';
    footer += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    footer += ' Devolutiva</button></div>';
  }

  var html = '<div class="card'+(r.needs_help?' needs-help':'')+'">';
  html += '<div class="card-top">';
  html += '<div class="card-top-left"><span class="cat-pill">'+esc(r.categoria)+'</span><div class="card-title">'+esc(r.titulo)+'</div></div>';
  html += '<div class="card-top-right"><span class="status-badge '+slugS(r.status)+'">'+iconS(r.status)+esc(r.status)+'</span>'+avatarHTML(r)+'</div>';
  html += '</div>';
  html += '<div class="card-fields">';
  html += '<div class="card-field"><span class="field-label">Unidade</span><span class="field-value">'+esc(r.unidade)+'</span></div>';
  html += '<div class="card-field"><span class="field-label">Departamento</span><span class="field-value">'+esc(r.departamento)+'</span></div>';
  html += '<div class="card-field"><span class="field-label">Solicitante</span><span class="field-value">'+esc(r.solicitante)+'</span></div>';
  html += '<div class="card-field"><span class="field-label">Abertura</span><span class="field-value">'+esc(r.data_abertura)+'</span></div>';
  if (r.obs) html += '<div class="card-field full"><span class="field-label">Devolutiva</span><span class="field-value obs">'+esc(r.obs)+'</span></div>';
  html += histHTML(r);
  html += '</div>'+footer+'</div>';
  return html;
}

// MODAL DEVOLUTIVA
function buildHistFeed(devolutivas) {
  if (!devolutivas || !devolutivas.length) return '<div class="mh-empty">Nenhuma atualizacao ainda.</div>';
  var h = '<div class="mh-feed">';
  devolutivas.forEach(function(dv) {
    var cls = 'mh-entry'+(dv.tipo==='help'?' mh-help':'');
    h += '<div class="'+cls+'">';
    if (dv.tipo==='help') {
      h += '<div class="mh-meta"><span style="font-family:DM Mono,monospace;font-size:9px;font-weight:600;color:#E8A020;text-transform:uppercase;letter-spacing:.5px">&#9888; Apoio solicitado</span>';
      h += '<span class="mh-ts">'+esc(dv.ts)+'</span></div>';
      h += '<div class="mh-text">'+esc(dv.obs)+'</div>';
    } else {
      h += '<div class="mh-meta"><span class="h-badge" style="background:'+bgOf(dv.status)+';color:'+fgOf(dv.status)+'">'+esc(dv.status)+'</span>';
      h += '<span class="mh-ts">'+esc(dv.ts)+'</span><span class="mh-resp">'+esc(dv.responsavel)+'</span></div>';
      h += '<div class="mh-text">'+esc(dv.obs)+'</div>';
      if (dv.custo) h += '<div class="mh-cost">Custo: '+esc(dv.custo)+'</div>';
    }
    h += '</div>';
  });
  return h+'</div>';
}

function openModal(id) {
  state.modalId = id;
  var r = manutencoes.find(function(m){ return m.id===id; });
  if (!r) return;

  document.getElementById('modal-ctx').innerHTML =
    '<div class="modal-ctx-title">'+esc(r.titulo)+'</div>'+
    '<div class="modal-ctx-row">'+esc(r.id)+' &middot; '+esc(r.unidade)+' &middot; '+esc(r.departamento)+'</div>'+
    '<div class="modal-ctx-row" style="margin-top:2px">Executor: <b>'+esc(r.executor)+'</b> &middot; Apoio: <b>'+esc(r.apoio)+'</b></div>';

  document.getElementById('modal-hist-feed').innerHTML = buildHistFeed(r.devolutivas);

  var btn = document.getElementById('btn-help');
  var txt = document.getElementById('help-text');
  if (r.needs_help) {
    btn.innerHTML = '&#10003; Apoio solicitado';
    btn.classList.add('active');
    txt.innerHTML = '<strong>'+esc(r.apoio)+'</strong> ja foi notificado.';
  } else {
    btn.innerHTML = '&#9888; Preciso de ajuda';
    btn.classList.remove('active');
    txt.innerHTML = '<strong>Precisa de apoio?</strong><br>Notifique <b>'+esc(r.apoio)+'</b>.';
  }

  document.getElementById('dev-status').value = r.status;
  document.getElementById('dev-responsavel').value = r.executor||'';
  document.getElementById('dev-data').value = '';
  document.getElementById('dev-custo').value = '';
  document.getElementById('dev-obs').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-box').scrollTop = 0;
}

function toggleHelp() {
  var r = manutencoes.find(function(m){ return m.id===state.modalId; });
  if (!r) return;
  var novoHelp = !r.needs_help;
  var msg = document.getElementById('dev-obs').value.trim() || (r.apoio+', preciso de apoio neste chamado.');
  apiPost({
    action: 'toggle_help',
    data: { id_chamado:r.id, needs_help:novoHelp, responsavel:r.executor, status:r.status, obs:msg }
  }, function(err) {
    if (err) { alert('Erro: '+err); return; }
    r.needs_help = novoHelp;
    r.devolutivas.unshift({ ts:nowLocal(), responsavel:r.executor, status:r.status, obs:msg, custo:'', tipo:novoHelp?'help':'update' });
    var btn = document.getElementById('btn-help');
    var txt = document.getElementById('help-text');
    if (novoHelp) {
      btn.innerHTML='&#10003; Apoio solicitado'; btn.classList.add('active');
      txt.innerHTML='<strong>'+esc(r.apoio)+'</strong> foi notificado.';
    } else {
      btn.innerHTML='&#9888; Preciso de ajuda'; btn.classList.remove('active');
      txt.innerHTML='<strong>Precisa de apoio?</strong><br>Notifique <b>'+esc(r.apoio)+'</b>.';
    }
    document.getElementById('modal-hist-feed').innerHTML = buildHistFeed(r.devolutivas);
    render();
  });
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); state.modalId=null; }
function handleOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function submitDevolutiva() {
  if (!state.modalId) return;
  var r = manutencoes.find(function(m){ return m.id===state.modalId; });
  if (!r) return;
  var obs = document.getElementById('dev-obs').value.trim();
  if (!obs) { document.getElementById('dev-obs').focus(); return; }
  var resp       = document.getElementById('dev-responsavel').value || r.executor;
  var novoStatus = document.getElementById('dev-status').value;
  var custo      = document.getElementById('dev-custo').value;

  showLoading('Salvando...');
  apiPost({
    action: 'registrar_devolutiva',
    data: { id_chamado:r.id, responsavel:resp, status:novoStatus, obs:obs, custo:custo, tipo:'update', needs_help:novoStatus==='Finalizado'?false:r.needs_help }
  }, function(err, data) {
    hideLoading();
    if (err) { alert('Erro ao salvar: '+err); return; }
    r.devolutivas.unshift({ ts:(data&&data.ts?data.ts:nowLocal()), responsavel:resp, status:novoStatus, obs:obs, custo:custo, tipo:'update' });
    r.status = novoStatus;
    r.executor = resp;
    if (novoStatus==='Finalizado') r.needs_help = false;
    closeModal();
    render();
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  });
}

// FAB — NOVO CHAMADO
function openFab() {
  document.getElementById('fab-overlay').classList.add('open');
  document.getElementById('fab-box').scrollTop = 0;
  var el = document.getElementById('fab-solicitante');
  if (el && typeof LOGGED_USER !== 'undefined') el.value = LOGGED_USER;
}
function closeFab() { document.getElementById('fab-overlay').classList.remove('open'); }
function handleFabOverlayClick(e) { if (e.target===document.getElementById('fab-overlay')) closeFab(); }

function submitNovoChamado() {
  var titulo      = document.getElementById('fab-titulo').value.trim();
  var unidade     = document.getElementById('fab-unidade').value;
  var departamento= document.getElementById('fab-departamento').value;
  if (!titulo)       { document.getElementById('fab-titulo').focus(); return; }
  if (!unidade)      { document.getElementById('fab-unidade').focus(); return; }
  if (!departamento) { document.getElementById('fab-departamento').focus(); return; }

  var prazoRaw = document.getElementById('fab-prazo').value;
  var prazoFmt = '';
  if (prazoRaw) { var p=prazoRaw.split('-'); prazoFmt=p[2]+'/'+p[1]+'/'+p[0]; }

  showLoading('Criando chamado...');
  apiPost({
    action: 'criar_chamado',
    data: {
      titulo:       titulo,
      unidade:      unidade,
      departamento: departamento,
      categoria:    document.getElementById('fab-categoria').value,
      prioridade:   document.getElementById('fab-prioridade').value,
      executor:     document.getElementById('fab-executor').value.trim(),
      apoio:        'Fabio Shiguematsu',
      solicitante:  document.getElementById('fab-solicitante').value.trim(),
      data_prazo:   prazoFmt,
      obs:          document.getElementById('fab-obs').value.trim()
    }
  }, function(err, data) {
    hideLoading();
    if (err) { alert('Erro ao criar: '+err); return; }
    closeFab();
    ['fab-titulo','fab-obs','fab-prazo'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.value='';
    });
    ['fab-unidade','fab-departamento','fab-categoria'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.selectedIndex=0;
    });
    var t = document.getElementById('toast');
    t.innerHTML = '&#10003; Chamado '+(data&&data.id?data.id:'')+' criado';
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
    carregarDados();
  });
}

// RENDER
function render() {
  var filtered = getFiltered();
  renderKPIs();
  renderFilters();
  var c = document.getElementById('content');
  c.innerHTML = filtered.length ? filtered.map(cardHTML).join('') : '<div class="empty-state"><p>Nenhum resultado encontrado</p></div>';
  document.getElementById('footer-date').textContent = 'Atualizado em '+new Date().toLocaleString('pt-BR');
}

carregarDados();
</script>
