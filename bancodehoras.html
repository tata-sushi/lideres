<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Horas — TATÁ Sushi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F4F4F4; --surface: #FFFFFF; --carbon: #35383F; --citric: #CFFF00;
  --text: #111111; --mid: #555555; --muted: #999999; --border: #E2E2E2;
  --green: #1A5C2A; --green-bg: #EAF4ED;
  --red: #7A1A1A; --red-bg: #FDEAEA;
  --blue: #1A3A5C; --blue-bg: #E8F0FA;
  --radius: 8px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── Header ── */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.logo-img { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
.header-title { font-size: 20px; font-weight: 700; color: var(--carbon); letter-spacing: -0.3px; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn-refresh { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--carbon); color: var(--citric); border: none; border-radius: var(--radius); padding: 7px 14px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
.btn-refresh:hover { opacity: 0.85; }
.btn-refresh.loading { opacity: 0.6; cursor: not-allowed; }
.sync-icon { font-size: 13px; display: inline-block; transition: transform 0.6s; }
.btn-refresh.loading .sync-icon { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filtros de Mês ── */
.mes-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; gap: 0; overflow-x: auto; }
.mes-tab { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); padding: 10px 16px; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
.mes-tab:hover { color: var(--carbon); }
.mes-tab.active { color: var(--carbon); border-bottom-color: var(--carbon); font-weight: 600; }

/* ── Filters ── */
.filters-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; }
.filters-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
.filter-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--mid); }
.filter-select {
  appearance: none;
  background: var(--bg) url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 7px 28px 7px 10px; font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text); cursor: pointer; width: 100%;
}
.filter-select:focus { outline: none; border-color: var(--carbon); }
.btn-clear { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 7px 0; white-space: nowrap; }
.btn-clear:hover { color: var(--carbon); }

/* ── Loading / Error ── */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--carbon); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
.error-state { background: var(--red-bg); border: 1px solid #f5c6c6; border-radius: var(--radius); padding: 20px; margin: 20px; }
.error-title { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.error-msg { font-size: 13px; color: var(--red); }
.error-hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 8px; }

/* ── KPI Cards ── */
.kpi-section { padding: 20px 20px 0; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
.kpi-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--carbon); letter-spacing: -1px; line-height: 1; }
.kpi-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }
.kpi-positive .kpi-value { color: var(--green); }
.kpi-negative .kpi-value { color: var(--red); }

/* ── Content ── */
.content { padding: 20px 20px 90px; }

/* ── Chart Block ── */
.chart-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.chart-title { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--mid); margin-bottom: 16px; }

/* Saldo por Área */
.bar-list { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: grid; grid-template-columns: 120px 1fr 70px; align-items: center; gap: 8px; }
.bar-name { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { height: 18px; background: #F4F4F4; border-radius: 4px; overflow: hidden; }
.bar-fill-pos { height: 100%; background: var(--carbon); border-radius: 4px; transition: width 0.4s ease; }
.bar-fill-neg { height: 100%; background: #CCC; border-radius: 4px; transition: width 0.4s ease; }
.bar-val { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; }
.bar-val.pos { color: var(--green); }
.bar-val.neg { color: var(--red); }

/* Tabela */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); padding: 8px 10px; text-align: left; border-bottom: 2px solid var(--carbon); background: var(--surface); cursor: pointer; user-select: none; }
thead th:hover { color: var(--carbon); }
thead th.sort-asc::after { content: ' ↑'; }
thead th.sort-desc::after { content: ' ↓'; }
tbody td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #FAFAFA; }
.saldo-pos { color: var(--green); font-family: 'DM Mono', monospace; font-weight: 600; font-size: 12px; }
.saldo-neg { color: var(--red); font-family: 'DM Mono', monospace; font-weight: 600; font-size: 12px; }
.saldo-zero { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
.badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
.badge-ativo { background: var(--green-bg); color: var(--green); }
.badge-desligado { background: var(--red-bg); color: var(--red); }

/* Legend */
.legend { display: flex; gap: 16px; margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--mid); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* Info strip */
.info-strip { background: var(--blue-bg); border: 1px solid #c5d8f0; border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.info-strip-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--blue); letter-spacing: 0.3px; }

/* ── Footer ── */
.footer { background: var(--carbon); padding: 12px 20px; display: flex; flex-direction: column; align-items: center; gap: 3px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
.footer-module { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--citric); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
.footer-date { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.4); }

/* Hidden when loading */
.data-container { display: none; }
.data-container.ready { display: block; }

@media (min-width: 768px) {
  .kpi-section, .content, .filters-wrap, .mes-tabs { max-width: 960px; margin-left: auto; margin-right: auto; }
  .filters-row { flex-wrap: nowrap; }
}
</style>
</head>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// ID da planilha Google Sheets (retirado da URL)
var SHEET_ID = '1oW3uXbig4B3gUQegxorxZghMnVrZcXk44AD08gx-cl0';

// Mapeamento de colunas (índices 0-based) conforme a aba "BANCO DE HORAS"
// A=DATA, B=MT, C=COLABORADOR, D=SALDO, E=STATUS, F=DEPARTAMENTO, G=UNIDADE, H=TIPO, I=SALÁRIO, J=FOLGA, K=CUSTO
var COL = {
  DATA: 0, MT: 1, COLABORADOR: 2, SALDO: 3, STATUS: 4,
  DEPARTAMENTO: 5, UNIDADE: 6, TIPO: 7, SALARIO: 8, FOLGA: 9, CUSTO: 10
};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
var ALL_ROWS = [];       // dados brutos (todos os meses)
var MESES = [];          // lista de meses disponíveis
var MES_ATIVO = null;    // mês selecionado
var state = { unidade: 'Todos', depto: 'Todos', status: 'Todos', tipo: 'Todos' };
var sortCol = 'saldo'; var sortDir = -1;

// ─── FETCH GOOGLE SHEETS ─────────────────────────────────────────────────────
// Usa a API de exportação CSV pública do Google Sheets
async function loadData() {
  var btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('error-state').style.display = 'none';
  document.getElementById('data-container').classList.remove('ready');

  try {
    // URL de exportação CSV pública (a planilha precisa estar compartilhada como "qualquer pessoa com o link pode ver")
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';

    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var csv = await resp.text();

    parseCSV(csv);
    buildMonthTabs();
    buildFilterOptions();
    renderAll();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('data-container').classList.add('ready');
    renderFooterDate();
  } catch(e) {
    document.getElementById('loading-state').style.display = 'none';
    showError(e);
  } finally {
    btn.classList.remove('loading');
  }
}

// ─── PARSE CSV ────────────────────────────────────────────────────────────────
function parseCSV(csv) {
  var lines = csv.split('\n');
  ALL_ROWS = [];

  // Pula linha de cabeçalho (linha 0)
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;

    var cols = parseCSVLine(line);
    if (cols.length < 9) continue;

    var saldo = parseFloat((cols[COL.SALDO] || '0').replace(',', '.')) || 0;
    var custo = parseFloat((cols[COL.CUSTO] || '0').replace('R$','').replace(/\./g,'').replace(',','.').trim()) || 0;
    var salario = parseFloat((cols[COL.SALARIO] || '0').replace('R$','').replace(/\./g,'').replace(',','.').trim()) || 0;
    var dataStr = cols[COL.DATA] || '';

    ALL_ROWS.push({
      data:        dataStr,
      mes:         parseMes(dataStr),
      mt:          cols[COL.MT] || '',
      nome:        (cols[COL.COLABORADOR] || '').trim(),
      saldo:       saldo,
      status:      (cols[COL.STATUS] || '').trim(),
      depto:       (cols[COL.DEPARTAMENTO] || '').trim(),
      unidade:     (cols[COL.UNIDADE] || '').trim(),
      tipo:        (cols[COL.TIPO] || '').trim(),
      salario:     salario,
      custo:       custo
    });
  }
}

function parseCSVLine(line) {
  var result = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

function parseMes(dateStr) {
  // Formato esperado: dd/mm/yyyy ou yyyy-mm-dd
  if (!dateStr) return null;
  var parts;
  if (dateStr.includes('/')) {
    parts = dateStr.split('/');
    if (parts.length >= 3) {
      // dd/mm/yyyy
      return parts[1].padStart(2,'0') + '/' + parts[2];
    }
  } else if (dateStr.includes('-')) {
    parts = dateStr.split('-');
    if (parts.length >= 3) {
      return parts[1].padStart(2,'0') + '/' + parts[0];
    }
  }
  return dateStr.substring(0, 7); // fallback
}

function parseMesLabel(mesKey) {
  var nomes = ['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  if (!mesKey) return mesKey;
  var parts = mesKey.split('/');
  var m = parseInt(parts[0]);
  var y = parts[1] ? parts[1].substring(2) : '';
  return (nomes[m] || mesKey) + ' ' + y;
}

// ─── MESES ────────────────────────────────────────────────────────────────────
function buildMonthTabs() {
  var seen = {};
  var meses = [];
  ALL_ROWS.forEach(function(r) {
    if (r.mes && !seen[r.mes]) { seen[r.mes] = 1; meses.push(r.mes); }
  });
  // Ordena cronologicamente
  meses.sort(function(a, b) {
    var ap = a.split('/'); var bp = b.split('/');
    var ay = ap[1] || ''; var by = bp[1] || '';
    var am = ap[0] || ''; var bm = bp[0] || '';
    if (ay !== by) return ay.localeCompare(by);
    return am.localeCompare(bm);
  });
  MESES = meses;
  MES_ATIVO = meses[meses.length - 1] || null; // último mês

  var tabsEl = document.getElementById('mes-tabs');
  tabsEl.innerHTML = meses.map(function(m) {
    return '<button class="mes-tab' + (m === MES_ATIVO ? ' active' : '') + '" onclick="selectMes(\'' + m + '\')">' + parseMesLabel(m) + '</button>';
  }).join('');
}

function selectMes(mes) {
  MES_ATIVO = mes;
  document.querySelectorAll('.mes-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.trim() === parseMesLabel(mes));
  });
  renderAll();
}

// ─── FILTROS ──────────────────────────────────────────────────────────────────
function buildFilterOptions() {
  var unidades = {}, deptos = {};
  ALL_ROWS.forEach(function(r) {
    if (r.unidade) unidades[r.unidade] = 1;
    if (r.depto) deptos[r.depto] = 1;
  });

  fillSelect('filtro-unidade', Object.keys(unidades).sort());
  fillSelect('filtro-depto', Object.keys(deptos).sort());
}

function fillSelect(id, opts) {
  var sel = document.getElementById(id);
  var cur = sel.value;
  sel.innerHTML = '<option>Todos</option>' + opts.map(function(o) {
    return '<option' + (o === cur ? ' selected' : '') + '>' + o + '</option>';
  }).join('');
}

function getMesRows() {
  if (!MES_ATIVO) return ALL_ROWS;
  return ALL_ROWS.filter(function(r) { return r.mes === MES_ATIVO; });
}

function getFiltered() {
  return getMesRows().filter(function(r) {
    if (state.unidade !== 'Todos' && r.unidade !== state.unidade) return false;
    if (state.depto   !== 'Todos' && r.depto   !== state.depto)   return false;
    if (state.status  !== 'Todos' && r.status  !== state.status)  return false;
    if (state.tipo    !== 'Todos' && r.tipo    !== state.tipo)    return false;
    return true;
  });
}

function applyFilters() {
  state.unidade = document.getElementById('filtro-unidade').value;
  state.depto   = document.getElementById('filtro-depto').value;
  state.status  = document.getElementById('filtro-status').value;
  state.tipo    = document.getElementById('filtro-tipo').value;
  renderAll();
}

function clearFilters() {
  ['filtro-unidade','filtro-depto','filtro-status','filtro-tipo'].forEach(function(id) {
    document.getElementById(id).value = 'Todos';
  });
  state = { unidade: 'Todos', depto: 'Todos', status: 'Todos', tipo: 'Todos' };
  renderAll();
}

// ─── KPI ─────────────────────────────────────────────────────────────────────
function renderKPI(data) {
  var total = data.length;
  var positivos = data.filter(function(c) { return c.saldo > 0; }).length;
  var negativos = data.filter(function(c) { return c.saldo < 0; }).length;
  var somaPos = data.reduce(function(a, c) { return c.saldo > 0 ? a + c.saldo : a; }, 0);
  var somaNeg = data.reduce(function(a, c) { return c.saldo < 0 ? a + c.saldo : a; }, 0);
  var somaCusto = data.reduce(function(a, c) { return a + Math.abs(c.custo || 0); }, 0);
  var pctNeg = total > 0 ? ((negativos / total) * 100).toFixed(0) : 0;

  document.getElementById('kpi-grid').innerHTML =
    kpiCard('COLABORADORES', total, '', '') +
    kpiCard('SALDO POSITIVO', fmtH(somaPos), 'h acumuladas', 'positive') +
    kpiCard('SALDO NEGATIVO', fmtH(somaNeg), 'h em débito', 'negative') +
    kpiCard('COM DÉBITO', pctNeg + '%', negativos + ' colaboradores', '') +
    kpiCard('CUSTO TOTAL', fmtR(somaCusto), 'banco de horas', '');
}

function kpiCard(label, val, sub, cls) {
  return '<div class="kpi-card ' + (cls ? 'kpi-' + cls : '') + '">' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-value">' + val + '</div>' +
    (sub ? '<div class="kpi-sub">' + sub + '</div>' : '') +
    '</div>';
}

function fmtH(n) {
  var s = n >= 0 ? '' : '−';
  var a = Math.abs(n);
  if (a >= 1000) return s + (a / 1000).toFixed(1) + 'k';
  return s + a.toFixed(0);
}

function fmtR(n) {
  if (n >= 1000000) return 'R$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return 'R$' + (n / 1000).toFixed(1) + 'k';
  return 'R$' + n.toFixed(0);
}

// ─── BARRAS DEPARTAMENTO ──────────────────────────────────────────────────────
function renderBarsDepto(data) {
  var map = {};
  data.forEach(function(r) {
    if (!r.depto) return;
    if (!map[r.depto]) map[r.depto] = 0;
    map[r.depto] += r.saldo;
  });
  renderBarsEl('bar-saldo', map);
}

function renderBarsUnidade(data) {
  var map = {};
  data.forEach(function(r) {
    if (!r.unidade) return;
    if (!map[r.unidade]) map[r.unidade] = 0;
    map[r.unidade] += r.saldo;
  });
  renderBarsEl('bar-unidade', map);
}

function renderBarsEl(elId, map) {
  var items = Object.keys(map).map(function(k) { return { nome: k, saldo: map[k] }; });
  items.sort(function(a, b) { return b.saldo - a.saldo; });
  var maxAbs = 0;
  items.forEach(function(a) { if (Math.abs(a.saldo) > maxAbs) maxAbs = Math.abs(a.saldo); });

  var html = '';
  items.forEach(function(a) {
    var pct = maxAbs > 0 ? (Math.abs(a.saldo) / maxAbs * 100).toFixed(1) : 0;
    var cls = a.saldo >= 0 ? 'bar-fill-pos' : 'bar-fill-neg';
    var vcls = a.saldo > 0 ? 'pos' : (a.saldo < 0 ? 'neg' : '');
    html += '<div class="bar-row">' +
      '<div class="bar-name">' + a.nome + '</div>' +
      '<div class="bar-track"><div class="' + cls + '" style="width:' + pct + '%"></div></div>' +
      '<div class="bar-val ' + vcls + '">' + (a.saldo > 0 ? '+' : '') + a.saldo.toFixed(0) + '</div>' +
      '</div>';
  });
  document.getElementById(elId).innerHTML = html || '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);padding:8px 0">Nenhum dado</div>';
}

// ─── TABELA ───────────────────────────────────────────────────────────────────
function sortTable(col) {
  if (sortCol === col) { sortDir = -sortDir; }
  else { sortCol = col; sortDir = col === 'saldo' || col === 'custo' ? -1 : 1; }
  renderTable(getFiltered());
  // atualiza classes dos th
  document.querySelectorAll('#table-colab thead th').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
  });
}

function renderTable(data) {
  var sorted = data.slice().sort(function(a, b) {
    var av = a[sortCol]; var bv = b[sortCol];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  var html = '';
  sorted.forEach(function(c) {
    var cls = c.saldo > 0 ? 'saldo-pos' : (c.saldo < 0 ? 'saldo-neg' : 'saldo-zero');
    var prefix = c.saldo > 0 ? '+' : '';
    var statusBadge = c.status === 'Desligado'
      ? '<span class="badge badge-desligado">Desligado</span>'
      : '<span class="badge badge-ativo">Ativo</span>';
    var custoFmt = c.custo !== 0 ? (c.custo > 0 ? '+' : '') + 'R$' + Math.abs(c.custo).toFixed(2) : '—';
    html += '<tr>' +
      '<td>' + (c.nome || '—') + '</td>' +
      '<td><span style="font-family:\'DM Mono\',monospace;font-size:11px">' + (c.depto || '—') + '</span></td>' +
      '<td><span style="font-family:\'DM Mono\',monospace;font-size:11px">' + (c.unidade || '—') + '</span></td>' +
      '<td>' + statusBadge + '</td>' +
      '<td style="text-align:right"><span class="' + cls + '">' + prefix + c.saldo.toFixed(2) + '</span></td>' +
      '<td style="text-align:right;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--mid)">' + custoFmt + '</td>' +
      '</tr>';
  });

  document.getElementById('tbody-colab').innerHTML = html ||
    '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px;font-family:\'DM Mono\',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.5px">Nenhum resultado</td></tr>';
  document.getElementById('count-label').textContent = '— ' + data.length + ' resultado' + (data.length !== 1 ? 's' : '');
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  var data = getFiltered();
  renderKPI(data);
  renderBarsDepto(data);
  renderBarsUnidade(data);
  renderTable(data);
}

// ─── ERROR ────────────────────────────────────────────────────────────────────
function showError(e) {
  var el = document.getElementById('error-state');
  el.innerHTML = '<div class="error-state">' +
    '<div class="error-title">⚠ Erro ao carregar dados</div>' +
    '<div class="error-msg">' + e.message + '</div>' +
    '<div class="error-hint">Verifique se a planilha está compartilhada como "Qualquer pessoa com o link pode ver".<br>' +
    'URL: https://docs.google.com/spreadsheets/d/' + SHEET_ID + '</div>' +
    '<button class="btn-refresh" style="margin-top:12px" onclick="loadData()">⟳ Tentar novamente</button>' +
    '</div>';
  el.style.display = 'block';
}

// ─── FOOTER DATE ──────────────────────────────────────────────────────────────
function renderFooterDate() {
  var now = new Date();
  var dd = String(now.getDate()).padStart(2, '0');
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var yyyy = now.getFullYear();
  var hh = String(now.getHours()).padStart(2, '0');
  var mi = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('footer-date').textContent = 'Atualizado em ' + dd + '/' + mm + '/' + yyyy + ' ' + hh + ':' + mi;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
</script>
