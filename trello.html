<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATÁ · Trello</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --carbon: #35383F;
    --citric: #CFFF00;
    --white: #FFFFFF;
    --black: #0A0A0A;
    --surface: #F4F4F2;
    --surface2: #EBEBEA;
    --border: rgba(53,56,63,0.12);
    --text-primary: #35383F;
    --text-secondary: #787878;
    --text-muted: #ADADAD;
    --danger: #D85A30;
    --success: #1D9E75;
    --warning: #BA7517;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--carbon);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--citric);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--carbon);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .logo-divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.2);
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #sync-btn {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  #sync-btn:hover { background: rgba(255,255,255,0.14); color: var(--white); }

  #user-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--citric);
    letter-spacing: 0.04em;
  }

  /* LAYOUT */
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

  /* BREADCRUMB */
  .breadcrumb {
    padding: 1rem 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--text-primary); }
  .breadcrumb .active { color: var(--text-primary); }
  .breadcrumb .sep { color: var(--text-muted); }

  /* PAGE TITLE */
  .page-header {
    padding: 1.25rem 0 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .page-title {
    font-size: 24px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .page-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    padding-bottom: 4px;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 0.875rem 1rem;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-val.danger { color: var(--danger); }
  .stat-val.success { color: var(--success); }
  .stat-val.citric { color: #7A9900; }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* BOARDS GRID */
  .boards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }

  .board-card {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .board-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(53,56,63,0.1);
  }

  .board-banner {
    height: 56px;
    position: relative;
  }

  .board-banner-letter {
    position: absolute;
    bottom: 8px;
    left: 12px;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }

  .board-body { padding: 12px 14px 14px; }

  .board-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .board-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }

  /* LISTS KANBAN */
  .kanban-wrap {
    overflow-x: auto;
    padding-bottom: 1.5rem;
    margin: 0 -2rem;
    padding: 0 2rem 1.5rem;
  }

  .kanban {
    display: flex;
    gap: 12px;
    min-width: max-content;
  }

  .list-col {
    width: 240px;
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 240px);
  }

  .list-head {
    padding: 10px 12px;
    background: var(--white);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
  }

  .list-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .list-badge {
    background: var(--surface2);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    padding: 1px 7px;
    white-space: nowrap;
  }

  .list-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }

  .card-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.12s;
  }

  .card-item:hover { border-color: var(--carbon); }

  .card-name {
    font-size: 12px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .card-labels {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-bottom: 5px;
  }

  .label-dot {
    height: 4px;
    border-radius: 999px;
    min-width: 28px;
  }

  .card-due {
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-due.overdue { color: var(--danger); }
  .card-due.done { color: var(--success); }

  .empty-col {
    padding: 1rem 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* STATES */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
    gap: 12px;
    text-align: center;
  }

  .state-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .state-msg {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .state-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .error-box {
    background: #FEF0EC;
    border: 0.5px solid #F5C4B3;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    font-size: 13px;
    color: var(--danger);
  }

  /* SEARCH */
  .search-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .search-input {
    flex: 1;
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--carbon); }
  .search-input::placeholder { color: var(--text-muted); }

  /* SPINNER */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--carbon);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">T</div>
    <span class="logo-text">TATÁ</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">TRELLO</span>
  </div>
  <div class="header-right">
    <span id="user-badge">—</span>
    <button id="sync-btn" onclick="reload()">↻ sincronizar</button>
  </div>
</header>

<div class="container">
  <div class="breadcrumb" id="breadcrumb">
    <span class="active">quadros</span>
  </div>
  <div class="page-header">
    <h1 class="page-title" id="page-title">Meus quadros</h1>
    <span class="page-count" id="page-count"></span>
  </div>
  <div id="stats-area"></div>
  <div id="search-area"></div>
  <div id="content-area"><div class="state-box"><div class="spinner"></div><div class="state-msg">Carregando...</div></div></div>
</div>

<script>
const KEY = 'e15ac9617bf7bac31ab5de0fba511680';
const TOKEN = 'f3b231e9f866289369f8cb06bc2eb0126f9d4a85b02e8f7adc35c33553c63c64';
const BASE = 'https://api.trello.com/1';

let currentBoard = null;
let allBoards = [];
let searchTerm = '';

const BOARD_COLORS = ['#35383F','#185FA5','#0F6E56','#534AB7','#993C1D','#993556','#3B6D11'];

async function api(path) {
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(`${BASE}${path}${sep}key=${KEY}&token=${TOKEN}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function q(id) { return document.getElementById(id); }

function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d);
  const now = new Date();
  return { text: dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'}), over: dt < now };
}

function colorForBoard(name, prefs) {
  const bg = prefs?.backgroundColor || prefs?.backgroundTopColor;
  if (bg && bg.startsWith('#')) return bg;
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % BOARD_COLORS.length;
  return BOARD_COLORS[h];
}

async function init() {
  try {
    const me = await api('/members/me?fields=fullName,username');
    q('user-badge').textContent = me.username || me.fullName || '';
    await showBoards();
  } catch(e) {
    q('content-area').innerHTML = `<div class="error-box">Erro de autenticação: ${e.message}<br><small>Verifique se a API Key e o Token estão corretos.</small></div>`;
  }
}

function reload() { currentBoard ? showBoard(currentBoard) : showBoards(); }

async function showBoards() {
  currentBoard = null;
  q('page-title').textContent = 'Meus quadros';
  q('page-count').textContent = '';
  q('stats-area').innerHTML = '';
  q('search-area').innerHTML = '';
  updateBreadcrumb();
  q('content-area').innerHTML = '<div class="state-box"><div class="spinner"></div><div class="state-msg">Carregando quadros...</div></div>';
  try {
    allBoards = await api('/members/me/boards?filter=open&fields=name,prefs,dateLastActivity,shortUrl,closed');
    allBoards = allBoards.filter(b => !b.closed);
    renderBoards(allBoards);
  } catch(e) {
    q('content-area').innerHTML = `<div class="error-box">Erro: ${e.message}</div>`;
  }
}

function renderBoards(boards) {
  q('page-count').textContent = `${boards.length} quadros`;

  const searchHtml = `<div class="search-row">
    <input class="search-input" id="board-search" placeholder="Buscar quadro..." oninput="filterBoards(this.value)">
  </div>`;
  q('search-area').innerHTML = searchHtml;

  if (!boards.length) {
    q('content-area').innerHTML = '<div class="state-box"><div class="state-icon">□</div><div class="state-msg">Nenhum quadro encontrado</div></div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'boards-grid';
  boards.forEach(b => {
    const color = colorForBoard(b.name, b.prefs);
    const letter = b.name.trim()[0].toUpperCase();
    const date = b.dateLastActivity ? new Date(b.dateLastActivity).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
    const card = document.createElement('div');
    card.className = 'board-card';
    card.innerHTML = `
      <div class="board-banner" style="background:${color}">
        <span class="board-banner-letter">${letter}</span>
      </div>
      <div class="board-body">
        <div class="board-name">${b.name}</div>
        <div class="board-date">${date}</div>
      </div>`;
    card.onclick = () => showBoard(b);
    grid.appendChild(card);
  });
  q('content-area').innerHTML = '';
  q('content-area').appendChild(grid);
}

function filterBoards(val) {
  const filtered = allBoards.filter(b => b.name.toLowerCase().includes(val.toLowerCase()));
  const grid = q('content-area').querySelector('.boards-grid');
  if (grid) {
    grid.innerHTML = '';
    filtered.forEach(b => {
      const color = colorForBoard(b.name, b.prefs);
      const letter = b.name.trim()[0].toUpperCase();
      const date = b.dateLastActivity ? new Date(b.dateLastActivity).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
      const card = document.createElement('div');
      card.className = 'board-card';
      card.innerHTML = `
        <div class="board-banner" style="background:${color}"><span class="board-banner-letter">${letter}</span></div>
        <div class="board-body"><div class="board-name">${b.name}</div><div class="board-date">${date}</div></div>`;
      card.onclick = () => showBoard(b);
      grid.appendChild(card);
    });
  }
  q('page-count').textContent = `${filtered.length} quadros`;
}

async function showBoard(board) {
  currentBoard = board;
  q('page-title').textContent = board.name;
  q('page-count').textContent = '';
  q('stats-area').innerHTML = '';
  q('search-area').innerHTML = '';
  updateBreadcrumb(board.name);
  q('content-area').innerHTML = '<div class="state-box"><div class="spinner"></div><div class="state-msg">Carregando listas e cards...</div></div>';
  try {
    const [lists, cards] = await Promise.all([
      api(`/boards/${board.id}/lists?filter=open&fields=name,id`),
      api(`/boards/${board.id}/cards?filter=open&fields=name,idList,due,dueComplete,labels,url,desc`)
    ]);

    const byList = {};
    lists.forEach(l => byList[l.id] = []);
    cards.forEach(c => { if (byList[c.idList] !== undefined) byList[c.idList].push(c); });

    const total = cards.length;
    const overdue = cards.filter(c => c.due && !c.dueComplete && new Date(c.due) < new Date()).length;
    const done = cards.filter(c => c.dueComplete).length;
    const withDue = cards.filter(c => c.due).length;

    q('stats-area').innerHTML = `
      <div class="stats-row">
        <div class="stat"><div class="stat-val">${lists.length}</div><div class="stat-label">listas</div></div>
        <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">cards</div></div>
        <div class="stat"><div class="stat-val ${overdue>0?'danger':''}">${overdue}</div><div class="stat-label">atrasados</div></div>
        <div class="stat"><div class="stat-val success">${done}</div><div class="stat-label">concluídos</div></div>
        <div class="stat"><div class="stat-val citric">${withDue}</div><div class="stat-label">com prazo</div></div>
      </div>`;

    // build search
    q('search-area').innerHTML = `<div class="search-row">
      <input class="search-input" id="card-search" placeholder="Buscar card..." oninput="filterCards(this.value)">
    </div>`;

    const kanbanWrap = document.createElement('div');
    kanbanWrap.className = 'kanban-wrap';
    const kanban = document.createElement('div');
    kanban.className = 'kanban';
    kanban.id = 'kanban-board';

    lists.forEach(l => {
      const listCards = byList[l.id] || [];
      const col = document.createElement('div');
      col.className = 'list-col';
      col.dataset.listId = l.id;

      const head = document.createElement('div');
      head.className = 'list-head';
      head.innerHTML = `<span class="list-name">${l.name}</span><span class="list-badge">${listCards.length}</span>`;
      col.appendChild(head);

      const body = document.createElement('div');
      body.className = 'list-body';
      body.id = `list-body-${l.id}`;

      if (!listCards.length) {
        body.innerHTML = '<div class="empty-col">vazio</div>';
      } else {
        listCards.forEach(c => body.appendChild(buildCard(c)));
      }

      col.appendChild(body);
      kanban.appendChild(col);
    });

    kanbanWrap.appendChild(kanban);
    q('content-area').innerHTML = '';
    q('content-area').appendChild(kanbanWrap);
  } catch(e) {
    q('content-area').innerHTML = `<div class="error-box">Erro ao carregar board: ${e.message}</div>`;
  }
}

function buildCard(c) {
  const item = document.createElement('div');
  item.className = 'card-item';
  item.dataset.name = c.name.toLowerCase();

  let labelsHtml = '';
  if (c.labels && c.labels.length) {
    labelsHtml = '<div class="card-labels">';
    c.labels.forEach(lb => {
      const col = LABEL_HEX[lb.color] || '#888';
      labelsHtml += `<div class="label-dot" style="background:${col};width:${Math.max(28, lb.name.length*5)}px" title="${lb.name}"></div>`;
    });
    labelsHtml += '</div>';
  }

  let dueHtml = '';
  if (c.due) {
    const d = fmtDate(c.due);
    let cls = '';
    let prefix = '';
    if (c.dueComplete) { cls = 'done'; prefix = '✓ '; }
    else if (d.over) { cls = 'overdue'; prefix = '⚠ '; }
    dueHtml = `<div class="card-due ${cls}">${prefix}${d.text}</div>`;
  }

  item.innerHTML = `${labelsHtml}<div class="card-name">${c.name}</div>${dueHtml}`;
  if (c.url) item.onclick = () => window.open(c.url, '_blank');
  return item;
}

const LABEL_HEX = {
  green:'#639922', yellow:'#BA7517', orange:'#D85A30', red:'#A32D2D',
  purple:'#534AB7', blue:'#185FA5', sky:'#1D9E75', lime:'#3B6D11',
  pink:'#993556', black:'#444441', null:'#888780'
};

function filterCards(val) {
  const term = val.toLowerCase();
  document.querySelectorAll('.card-item').forEach(el => {
    el.style.display = el.dataset.name.includes(term) ? '' : 'none';
  });
}

function updateBreadcrumb(boardName) {
  const bc = q('breadcrumb');
  if (!boardName) {
    bc.innerHTML = '<span class="active">quadros</span>';
  } else {
    bc.innerHTML = `
      <span onclick="showBoards()" style="cursor:pointer">quadros</span>
      <span class="sep">/</span>
      <span class="active">${boardName}</span>`;
  }
}

init();
</script>
</body>
</html>
