<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--carbon:#35383F;--citric:#70ff41;}
body{font-family:'DM Sans',sans-serif;background:#1a1a1a;padding:2rem;}
.section-label{font-family:'DM Mono',monospace;font-size:11px;color:#888;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.75rem;}
.editor-panel{background:#2a2a2a;border:0.5px solid #444;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;}
.field-row{display:grid;grid-template-columns:110px 1fr;align-items:center;gap:8px;margin-bottom:.75rem;}
.field-row:last-child{margin-bottom:0;}
.field-label{font-family:'DM Mono',monospace;font-size:11px;color:#888;letter-spacing:.06em;}
.field-row input,.field-row select{font-family:'DM Sans',sans-serif;font-size:14px;padding:6px 10px;border:0.5px solid #555;border-radius:8px;background:#1a1a1a;color:#fff;width:100%;}
.field-row input:focus,.field-row select:focus{outline:none;border-color:#70ff41;box-shadow:0 0 0 2px rgba(112,255,65,0.2);}
.field-row select option{background:#1a1a1a;}
.preview-area{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:flex-start;}
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.card-label{font-family:'DM Mono',monospace;font-size:10px;color:#666;letter-spacing:.08em;}
.card{width:350px;height:200px;border-radius:10px;position:relative;overflow:hidden;flex-shrink:0;}
.card-front{background:#000000;}
.cf-logo{position:absolute;top:16px;left:18px;display:flex;align-items:center;gap:9px;}
.cf-logo img{width:34px;height:auto;object-fit:contain;filter:brightness(0) invert(1);}
.cf-logo-text .tata{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.1em;line-height:1;}
.cf-logo-text .sushi{font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,.4);letter-spacing:.3em;text-transform:uppercase;margin-top:2px;}
.cf-accent{position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--citric);}
.cf-info{position:absolute;bottom:20px;left:20px;right:20px;}
.cf-nome{font-size:16px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px;}
.cf-cargo{font-family:'DM Mono',monospace;font-size:10px;color:var(--citric);letter-spacing:.06em;margin-bottom:8px;}
.cf-addr{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.42);letter-spacing:.03em;line-height:1.65;}
.cf-qr{position:absolute;bottom:14px;right:14px;width:78px;height:78px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cf-qr canvas,.cf-qr img{width:70px!important;height:70px!important;}
.card-back{background:var(--citric);}
.cb-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;}
.cb-center img{width:95px;height:auto;object-fit:contain;}
.cb-tata{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:var(--carbon);letter-spacing:.14em;line-height:1;}
.cb-sushi{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.32em;color:rgba(53,56,63,.45);text-transform:uppercase;}
.cb-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--carbon);}
.actions{display:flex;gap:.75rem;flex-wrap:wrap;}
.btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.05em;padding:9px 20px;border-radius:8px;cursor:pointer;border:0.5px solid #555;background:transparent;color:#ccc;transition:background .15s;}
.btn:hover{background:#2a2a2a;}
.btn.primary{background:var(--carbon);color:var(--citric);border-color:var(--carbon);font-weight:500;}
.btn.primary:hover{background:#2a2d33;}
.hint{font-size:11px;color:#888;margin-top:.75rem;font-family:'DM Mono',monospace;letter-spacing:.03em;}
</style>
</head>
<body>

<p class="section-label">Cartão de Visita · Editor</p>

<div class="editor-panel">
  <div class="field-row">
    <span class="field-label">Nome</span>
    <input type="text" id="f-nome" value="Luis Carlos" placeholder="Nome completo" oninput="update()">
  </div>
  <div class="field-row">
    <span class="field-label">Cargo</span>
    <input type="text" id="f-cargo" value="Maître" placeholder="Cargo / função" oninput="update()">
  </div>
  <div class="field-row">
    <span class="field-label">Unidade</span>
    <select id="f-unidade" onchange="setUnit()">
      <option value="itaim">Itaim Bibi</option>
      <option value="pinheiros">Pinheiros</option>
      <option value="poke">Poke Pinheiros</option>
      <option value="administrativo">Administrativo</option>
      <option value="custom">Personalizado...</option>
    </select>
  </div>
  <div class="field-row" id="row-custom" style="display:none;">
    <span class="field-label">Endereço</span>
    <input type="text" id="f-end-custom" placeholder="Rua, número — Bairro" oninput="update()">
  </div>
</div>

const UNITS = {
  itaim:         ['Rua João Cachoeira, 278',        'Itaim Bibi · São Paulo'],
  pinheiros:     ['Av. Faria Lima, 120',             'Pinheiros · São Paulo'],
  poke:          ['Rua Tucumbira, 120',              'Pinheiros · São Paulo'],
  administrativo:['Av. Nove de Julho, 5593 CJ 111/112', 'São Paulo']
};

function getAddrLines(){
  const u = document.getElementById('f-unidade').value;
  if(u==='custom') return [document.getElementById('f-end-custom').value||'',''];
  return UNITS[u]||['',''];
}
function setUnit(){
  const u = document.getElementById('f-unidade').value;
  document.getElementById('row-custom').style.display = u==='custom'?'grid':'none';
  update();
  updateQR();
}
function update(){
  const nome  = document.getElementById('f-nome').value  || 'Nome';
  const cargo = document.getElementById('f-cargo').value || 'Cargo';
  const [a1,a2] = getAddrLines();
  document.getElementById('prev-nome').textContent  = nome;
  document.getElementById('prev-cargo').textContent = cargo;
  document.getElementById('prev-addr').innerHTML    = a1+(a2?'<br>'+a2:'');
}
function resetFields(){
  document.getElementById('f-nome').value='';
  document.getElementById('f-cargo').value='';
  document.getElementById('f-unidade').value='itaim';
  document.getElementById('row-custom').style.display='none';
  update();
}

function loadLogoCanvas(filter,cb){
  const img = new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const cv=document.createElement('canvas');
    cv.width=img.naturalWidth; cv.height=img.naturalHeight;
    const ctx=cv.getContext('2d');
    if(filter) ctx.filter=filter;
    ctx.drawImage(img,0,0);
    cb({dataUrl:cv.toDataURL('image/png'), w:img.naturalWidth, h:img.naturalHeight});
  };
  img.onerror=()=>cb(null);
  img.src=LOGO_SRC;
}

function generatePDF(){
  const hint = document.getElementById('hint-msg');
  hint.textContent = 'Preparando...';
  // Give QRCode.js a tick to finish rendering if needed
  setTimeout(_doPDF, 50);
}
function _doPDF(){
  const hint = document.getElementById('hint-msg');

  const nome  = document.getElementById('f-nome').value.trim() || 'Nome';
  const cargo = document.getElementById('f-cargo').value.trim() || 'Cargo';
  const [a1, a2] = getAddrLines();
  const slug  = nome.toLowerCase().replace(/\s+/g,'-');

  // PDF dimensions: 90×54mm (standard business card ratio)
  const W = 90, H = 54;

  // Colors
  const BLACK  = [0, 0, 0];
  const WHITE  = [255, 255, 255];
  const CITRIC = [112, 255, 65];   // #70FF41
  const CARBON = [53, 56, 63];     // #35383F
  const GRAY   = [155, 158, 163];

  // Build white logo PNG from LOGO_SRC via canvas (filter: brightness(0) invert(1))
  function buildLogoDataUrl(filter, cb){
    const img = new Image();
    img.onload = function(){
      const cv = document.createElement('canvas');
      cv.width = img.naturalWidth; cv.height = img.naturalHeight;
      const ctx = cv.getContext('2d');
      if(filter){ ctx.filter = filter; }
      ctx.drawImage(img, 0, 0);
      cb(cv.toDataURL('image/png'), img.naturalWidth, img.naturalHeight);
    };
    img.onerror = () => cb(null, 0, 0);
    img.src = LOGO_SRC;
  }

  // Get QR as PNG — QRCode.js may render canvas OR img
  function getQRDataUrl(){
    // Try canvas first
    const qrCanvas = document.querySelector('#qr-preview canvas');
    if(qrCanvas) return qrCanvas.toDataURL('image/png');
    // Fallback: img element
    const qrImg = document.querySelector('#qr-preview img');
    if(qrImg && qrImg.src) return qrImg.src;
    return null;
  }

  buildLogoDataUrl('brightness(0) invert(1)', function(logoWhite, lW, lH){
    buildLogoDataUrl(null, function(logoDark, ldW, ldH){
      try {
        const {jsPDF} = window.jspdf;
        const doc = new jsPDF({orientation:'landscape', unit:'mm', format:[W, H]});

        /* ── FRENTE ── */
        // Fundo preto
        doc.setFillColor(...BLACK);
        doc.rect(0, 0, W, H, 'F');

        // Logo branco — canto superior esquerdo
        if(logoWhite && lW && lH){
          const lh = 10.8, lw = lh * (lW / lH);
          doc.addImage(logoWhite, 'PNG', 5, 4, lw, lh);
        }

        // Nome
        doc.setTextColor(...WHITE);
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.text(nome, 6, H - 18);

        // Cargo
        doc.setTextColor(...CITRIC);
        doc.setFontSize(7);
        doc.setFont('helvetica', 'normal');
        doc.text(cargo, 6, H - 13);

        // Endereço
        doc.setTextColor(...GRAY);
        doc.setFontSize(6);
        if(a1) doc.text(a1, 6, H - 8.5);
        if(a2) doc.text(a2, 6, H - 4.5);

        // QR code — canto inferior direito
        const qrData = getQRDataUrl();
        if(qrData){
          const qS = 18; // tamanho do QR em mm
          // Fundo branco para o QR
          doc.setFillColor(...WHITE);
          doc.rect(W - qS - 4, H - qS - 4, qS + 2, qS + 2, 'F');
          doc.addImage(qrData, 'PNG', W - qS - 3, H - qS - 3, qS, qS);
        }

        /* ── VERSO ── */
        doc.addPage([W, H], 'landscape');
        // Fundo citric
        doc.setFillColor(...CITRIC);
        doc.rect(0, 0, W, H, 'F');

        // Logo dark — centralizado
        if(logoDark && ldW && ldH){
          const lh2 = 30, lw2 = lh2 * (ldW / ldH);
          doc.addImage(logoDark, 'PNG', W/2 - lw2/2, H/2 - lh2/2, lw2, lh2);
        }

        doc.save('cartao-tata-' + slug + '.pdf');
        hint.textContent = 'PDF gerado ✓';
      } catch(e){
        hint.textContent = 'Erro: ' + e.message;
      }
    });
  });
}
update();
updateQR();
</script>
